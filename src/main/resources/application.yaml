spring:
  application:
    name: RuleEngine
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/db}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true

  output:
    ansi:
      enabled: always

  kafka:
    bootstrap-servers: localhost:9092
    client-id: rule-engine
    consumer:
      group-id: default
      auto-offset-reset: earliest

app:
  kafka:
    topics:
      input:
        name: input
        partitions: 1
        replicas: 1
        group-id: input-processors
      output:
        name: output
        partitions: 1
        replicas: 1
        group-id: output-processors
  conditions:
    path: classpath:rules/conditions.json
  transformations:
    path: classpath:rules/transformations.json
